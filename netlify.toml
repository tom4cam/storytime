# Brennan's Story Maker: Netlify configuration
#
# This project has been migrated to Cloudflare Pages:
#   https://storytime-app.pages.dev
#
# Netlify now serves as a permanent 301 redirect so old story links
# (/s/<id>, etc.) keep working.

[build]
  publish = "_redirect_site"
  # No build needed; we just publish a tiny placeholder dir with a
  # _redirects file. The actual app lives on Cloudflare now.
  command = "mkdir -p _redirect_site && echo 'Moved to https://storytime-app.pages.dev' > _redirect_site/index.html"
  # Skip rebuilds for doc-only commits.
  ignore = "git diff --quiet HEAD^ HEAD -- ':(exclude)docs/' ':(exclude)README.md' ':(exclude).gitignore' ':(exclude)scripts/'"

# 301 redirect everything to the new Cloudflare site, preserving the
# path and query string. The `:splat` placeholder captures whatever
# came after the leading slash.
[[redirects]]
  from = "/*"
  to = "https://storytime-app.pages.dev/:splat"
  status = 301
  force = true
